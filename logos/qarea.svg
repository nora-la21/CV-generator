<svg xmlns="http://www.w3.org/2000/svg" width="195" height="58" viewBox="0 0 195 58">
  <!-- Icon: outer filled red squircle -->
  <rect x="1" y="1" width="56" height="56" rx="17" ry="17" fill="#E8352A"/>
  <!-- White cutout (inner) -->
  <rect x="7" y="7" width="44" height="44" rx="13" ry="13" fill="white"/>
  <!-- Red middle ring -->
  <rect x="12" y="12" width="34" height="34" rx="10" ry="10" fill="none" stroke="#E8352A" stroke-width="4.5"/>
  <!-- Red inner ring -->
  <rect x="19" y="19" width="20" height="20" rx="6" ry="6" fill="none" stroke="#E8352A" stroke-width="3.5"/>
  <!-- QAREA wordmark -->
  <text x="68" y="41" font-family="Arial Black,Arial,sans-serif" font-size="30" font-weight="900" fill="#1a1a1a" letter-spacing="-0.5">QAREA</text>
</svg>
