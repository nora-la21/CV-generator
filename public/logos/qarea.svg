<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <!-- Outer squircle -->
  <rect x="2" y="2" width="56" height="56" rx="16" ry="16" fill="none" stroke="#E8352A" stroke-width="3.5"/>
  <!-- Middle squircle -->
  <rect x="10" y="10" width="40" height="40" rx="11" ry="11" fill="none" stroke="#E8352A" stroke-width="3"/>
  <!-- Inner squircle (Q body) -->
  <rect x="18" y="18" width="24" height="24" rx="7" ry="7" fill="none" stroke="#E8352A" stroke-width="3"/>
  <!-- Q tail -->
  <line x1="36" y1="36" x2="43" y2="43" stroke="#E8352A" stroke-width="3.5" stroke-linecap="round"/>
  <!-- QAREA wordmark -->
  <text x="70" y="42" font-family="Arial Black,Arial,sans-serif" font-size="30" font-weight="900" fill="#1a1a1a" letter-spacing="-0.5">QAREA</text>
</svg>
